<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="Noah Walker">
    <meta name="copyright" content="Original concept by Noah Walker">
    <title>文明摇篮：终局</title>
    <link rel="stylesheet" href="styles.css?v=20260707">
  </head>
  <body class="ending-body">
    <main class="ending-shell" aria-label="文明摇篮终局">
      <section class="ending-scene">
        <h1 id="endingTitle">终局</h1>
        <p class="origin-mark ending-origin">原创企划 / Original concept: Noah Walker</p>
        <div class="ending-copy" id="endingCopy"></div>
        <section class="ending-recap" aria-label="终局复盘">
          <h2>本局复盘</h2>
          <dl id="endingRecapList"></dl>
          <button id="copyChallengeButton" type="button">复制挑战链接</button>
        </section>
        <button id="restartButton" type="button" aria-label="新世界，快捷键 Shift+N" aria-keyshortcuts="Shift+N">
          <span>新世界</span>
          <span class="inline-shortcut" aria-hidden="true">Shift+N</span>
        </button>
        <form class="seed-form ending-seed-form" id="endingSeedForm" autocomplete="off">
          <label for="endingSeedInput">指定种子</label>
          <div>
            <input id="endingSeedInput" name="seed" inputmode="numeric" pattern="[0-9]*" placeholder="例如 1058">
            <button id="endingSeedStartButton" type="submit" aria-label="使用指定种子开始，快捷键 Enter">
              <span>开始</span>
              <span class="inline-shortcut" aria-hidden="true">Enter</span>
            </button>
          </div>
        </form>
      </section>
    </main>

    <script src="endings.js"></script>
    <script src="desktop.js"></script>
    <script>
      "use strict";

      const GAME_STORE_KEY = "three-sun-chronicle:v1";
      const ENDING_STORE_KEY = "three-sun-chronicle:ending:v1";
      const endingTitle = document.querySelector("#endingTitle");
      const endingCopy = document.querySelector("#endingCopy");
      const endingRecapList = document.querySelector("#endingRecapList");
      const copyChallengeButton = document.querySelector("#copyChallengeButton");
      const restartButton = document.querySelector("#restartButton");
      const endingSeedForm = document.querySelector("#endingSeedForm");
      const endingSeedInput = document.querySelector("#endingSeedInput");

      function readStoredEnding() {
        try {
          const raw = localStorage.getItem(ENDING_STORE_KEY);
          return raw ? JSON.parse(raw) : null;
        } catch {
          return null;
        }
      }

      function clearGame() {
        try {
          localStorage.removeItem(GAME_STORE_KEY);
          localStorage.removeItem(ENDING_STORE_KEY);
        } catch {
          // Storage is optional for the static build.
        }
      }

      const storedEnding = readStoredEnding();
      const queryEnding = new URLSearchParams(window.location.search).get("ending");
      const endingId = queryEnding || storedEnding?.id || "A";
      document.body.dataset.ending = endingId;
      const ending = window.THREE_SUN_ENDINGS?.[endingId] || {
        name: `${endingId}结局`,
        paragraphs: ["终局资料缺失。"],
        quote: ""
      };

      document.title = `文明摇篮：${ending.name}`;
      endingTitle.innerHTML = "";
      ending.name.split("/").forEach((line) => {
        const titleLine = document.createElement("span");
        titleLine.className = "ending-title-line";
        titleLine.textContent = line;
        endingTitle.append(titleLine);
      });
      endingCopy.innerHTML = "";

      ending.paragraphs.forEach((line) => {
        const paragraph = document.createElement("p");
        paragraph.textContent = line;
        endingCopy.append(paragraph);
      });

      if (ending.quote) {
        const quote = document.createElement("p");
        quote.className = "ending-quote";
        const italic = document.createElement("em");
        const [quoteText, ...attributionParts] = ending.quote.split("——");
        const quoteLine = document.createElement("span");
        quoteLine.className = "quote-line";
        quoteLine.textContent = quoteText;
        italic.append(quoteLine);
        if (attributionParts.length) {
          const attribution = document.createElement("span");
          attribution.className = "quote-attribution";
          attribution.textContent = `——${attributionParts.join("——")}`;
          italic.append(attribution);
        }
        quote.append(italic);
        endingCopy.append(quote);
      }

      function formatNumber(value) {
        return new Intl.NumberFormat("zh-CN", { maximumFractionDigits: 0 }).format(Number(value) || 0);
      }

      function renderRecap() {
        const snapshot = storedEnding?.snapshot || {};
        const peak = storedEnding?.peakSnapshot || snapshot;
        const endingStats = storedEnding?.endingStats || {};
        const unique = endingStats.endings
          ? Object.values(endingStats.endings).filter((count) => count > 0).length
          : 0;
        const rows = [
          ["种子", storedEnding?.seed ?? "未知"],
          ["文明", storedEnding?.civilization ? `第 ${formatNumber(storedEnding.civilization)} 号` : "未知"],
          ["年份", storedEnding?.turn ? `${formatNumber(storedEnding.turn)} 年` : "未知"],
          ["触发", storedEnding?.trigger || ending.name],
          ["终局统计", endingStats.total ? `已达成 ${formatNumber(unique)} 种 / 总计 ${formatNumber(endingStats.total)} 次` : "尚未记录"],
          ["终值", `SC ${formatNumber(snapshot.sc)} / BE ${formatNumber(snapshot.be)} / LA ${formatNumber(snapshot.la)} / POP ${formatNumber(snapshot.pop)} / ECO ${formatNumber(snapshot.eco)} / 秩序 ${formatNumber(snapshot.stability)}`],
          ["峰值", `SC ${formatNumber(peak.sc)} / BE ${formatNumber(peak.be)} / LA ${formatNumber(peak.la)} / POP ${formatNumber(peak.pop)} / ECO ${formatNumber(peak.eco)} / EERF ${formatNumber(peak.eerf)}`]
        ];
        endingRecapList.innerHTML = rows.map(([label, value]) => `<div><dt>${label}</dt><dd>${value}</dd></div>`).join("");
        copyChallengeButton.disabled = !storedEnding?.seed;
      }

      function challengeUrl() {
        const url = new URL("index.html", window.location.href);
        if (storedEnding?.seed) {
          url.searchParams.set("seed", storedEnding.seed);
        }
        return url.href;
      }

      async function copyChallengeLink() {
        const link = challengeUrl();
        try {
          await navigator.clipboard.writeText(link);
          copyChallengeButton.textContent = "已复制";
        } catch {
          copyChallengeButton.textContent = link;
        }
        window.setTimeout(() => {
          copyChallengeButton.textContent = "复制挑战链接";
        }, 1600);
      }

      renderRecap();

      function restartGame() {
        clearGame();
        window.location.href = new URL("index.html", window.location.href).href;
      }

      function restartGameWithSeed(event) {
        event.preventDefault();
        const seedText = endingSeedInput.value.trim();
        if (!seedText) {
          restartGame();
          return;
        }

        clearGame();
        const url = new URL("index.html", window.location.href);
        url.searchParams.set("seed", seedText);
        window.location.href = url.href;
      }

      function shouldIgnoreShortcut(event) {
        if (event.defaultPrevented || event.metaKey || event.ctrlKey || event.altKey || event.repeat) return true;
        const target = event.target;
        if (!target || target === document.body) return false;
        const tagName = target.tagName;
        return target.isContentEditable || tagName === "INPUT" || tagName === "TEXTAREA" || tagName === "SELECT";
      }

      function flashRestartButton() {
        restartButton.classList.remove("shortcut-flash");
        void restartButton.offsetWidth;
        restartButton.classList.add("shortcut-flash");
        window.setTimeout(() => restartButton.classList.remove("shortcut-flash"), 180);
      }

      restartButton.addEventListener("click", restartGame);
      copyChallengeButton.addEventListener("click", copyChallengeLink);
      endingSeedForm.addEventListener("submit", restartGameWithSeed);
      window.addEventListener("keydown", (event) => {
        if (shouldIgnoreShortcut(event)) return;
        if (event.key.toLowerCase() !== "n" || !event.shiftKey) return;
        event.preventDefault();
        flashRestartButton();
        restartGame();
      });
    </script>
  </body>
</html>
